<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AJAX CRUD - Student Management</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh; padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { text-align: center; color: white; margin-bottom: 30px; font-size: 2.5em; }
    
    .form-section { 
      background: white; 
      padding: 30px; 
      border-radius: 15px; 
      box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
      margin-bottom: 30px;
    }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
    input, select { padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; transition: border-color 0.3s; }
    input:focus, select:focus { outline: none; border-color: #667eea; }
    .btn { 
      padding: 12px 24px; 
      border: none; 
      border-radius: 8px; 
      font-size: 16px; 
      cursor: pointer; 
      transition: all 0.3s;
    }
    .btn-primary { background: #667eea; color: white; }
    .btn-primary:hover { background: #5a67d8; transform: translateY(-2px); }
    .btn-success { background: #48bb78; color: white; }
    .btn-success:hover { background: #38a169; }
    .btn-danger { background: #f56565; color: white; }
    .btn-danger:hover { background: #e53e3e; }
    .btn-warning { background: #ed8936; color: white; }
    .btn-warning:hover { background: #dd6b20; }
    
    .message { 
      padding: 12px 20px; 
      border-radius: 8px; 
      margin-bottom: 20px; 
      font-weight: 500;
      display: none;
    }
    .success { background: #c6f6d5; color: #22543d; border: 1px solid #9ae6b4; }
    .error { background: #fed7d7; color: #742a2a; border: 1px solid #fc8181; }
    
    .table-container { 
      background: white; 
      border-radius: 15px; 
      box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 15px; text-align: left; border-bottom: 1px solid #e2e8f0; }
    th { background: #f7fafc; font-weight: 600; color: #4a5568; }
    tr:hover { background: #f7fafc; }
    .loading { text-align: center; padding: 40px; color: #718096; font-style: italic; }
    .empty { text-align: center; padding: 40px; color: #a0aec0; font-style: italic; }
    
    .action-buttons { white-space: nowrap; }
    .action-buttons .btn { padding: 6px 12px; font-size: 14px; margin-right: 5px; }
    
    @media (max-width: 768px) {
      .form-grid { grid-template-columns: 1fr; }
      .action-buttons .btn { display: block; width: 100%; margin-bottom: 5px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎓 Student Management System</h1>
    
    <!-- Messages -->
    <div id="message" class="message"></div>
    
    <!-- CRUD Form -->
    <div class="form-section">
      <h3 style="margin-bottom: 20px; color: #333;">📝 Manage Student</h3>
      <form id="studentForm">
        <div class="form-grid">
          <input type="hidden" id="studentId" value="">
          <input type="text" id="name" placeholder="Student Name" required>
          <input type="text" id="department" placeholder="Department" required>
          <input type="number" id="marks" placeholder="Marks (0-100)" min="0" max="100" required>
        </div>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
          <button type="submit" class="btn btn-primary" id="saveBtn">💾 Save Student</button>
          <button type="button" class="btn btn-warning" id="clearBtn">🗑️ Clear Form</button>
        </div>
      </form>
    </div>
    
    <!-- Students Table -->
    <div class="table-container">
      <div style="padding: 20px; border-bottom: 1px solid #e2e8f0;">
        <button type="button" class="btn btn-success" id="loadBtn">🔄 Load Students</button>
      </div>
      <div id="tableContent">
        <div class="loading">Loading students...</div>
      </div>
    </div>
  </div>

  <script>
    // Simulated database in memory (persists across operations)
    let students = [];
    let editId = null;
    
    // DOM elements
    const form = document.getElementById('studentForm');
    const studentIdInput = document.getElementById('studentId');
    const nameInput = document.getElementById('name');
    const deptInput = document.getElementById('department');
    const marksInput = document.getElementById('marks');
    const messageDiv = document.getElementById('message');
    const tableContent = document.getElementById('tableContent');
    const saveBtn = document.getElementById('saveBtn');
    const clearBtn = document.getElementById('clearBtn');
    const loadBtn = document.getElementById('loadBtn');

    // Utility functions
    function showMessage(text, type = 'success') {
      messageDiv.textContent = text;
      messageDiv.className = `message ${type}`;
      messageDiv.style.display = 'block';
      setTimeout(() => messageDiv.style.display = 'none', 3000);
    }

    function simulateApiDelay() {
      return new Promise(resolve => setTimeout(resolve, 800));
    }

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2);
    }

    // HTTP Status simulation
    async function simulateHttpRequest(promise, successStatus = 200) {
      await simulateApiDelay();
      try {
        const result = await promise;
        return { ok: true, status: successStatus, data: result };
      } catch (error) {
        return { 
          ok: false, 
          status: Math.random() > 0.5 ? 404 : 500, 
          error: error.message 
        };
      }
    }

    // CRUD Operations
    const API = {
      // READ - Get all students
      async getAll() {
        return simulateHttpRequest(Promise.resolve(students));
      },

      // CREATE - Add new student
      async create(studentData) {
        const newStudent = { id: generateId(), ...studentData, createdAt: new Date().toISOString() };
        students.unshift(newStudent);
        return simulateHttpRequest(Promise.resolve(newStudent), 201);
      },

      // UPDATE - Update existing student
      async update(id, studentData) {
        const index = students.findIndex(s => s.id === id);
        if (index === -1) {
          throw new Error('Student not found');
        }
        students[index] = { ...students[index], ...studentData, updatedAt: new Date().toISOString() };
        return simulateHttpRequest(Promise.resolve(students[index]));
      },

      // DELETE - Remove student
      async delete(id) {
        const index = students.findIndex(s => s.id === id);
        if (index === -1) {
          throw new Error('Student not found');
        }
        students.splice(index, 1);
        return simulateHttpRequest(Promise.resolve({ deleted: true }), 200);
      }
    };

    // Display students table
    async function loadStudents() {
      tableContent.innerHTML = '<div class="loading">🔄 Loading students...</div>';
      
      const response = await API.getAll();
      
      if (!response.ok) {
        tableContent.innerHTML = '<div class="empty">❌ Failed to load students (Status: ' + response.status + ')</div>';
        handleHttpError(response);
        return;
      }

      if (students.length === 0) {
        tableContent.innerHTML = '<div class="empty">📭 No students found. Add your first student!</div>';
        return;
      }

      const table = `
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Department</th>
              <th>Marks</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${students.map(student => `
              <tr>
                <td>${student.id.slice(-8)}</td>
                <td>${student.name}</td>
                <td>${student.department}</td>
                <td>${student.marks} ${getGrade(student.marks)}</td>
                <td>
                  <span class="badge ${getGradeClass(student.marks)}">${getGrade(student.marks)}</span>
                </td>
                <td class="action-buttons">
                  <button class="btn btn-warning edit-btn" data-id="${student.id}">✏️ Edit</button>
                  <button class="btn btn-danger delete-btn" data-id="${student.id}">🗑️ Delete</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      
      tableContent.innerHTML = table;
      
      // Add event listeners
      document.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', handleEdit);
      });
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', handleDelete);
      });
    }

    function getGrade(marks) {
      if (marks >= 90) return 'A+';
      if (marks >= 80) return 'A';
      if (marks >= 70) return 'B';
      if (marks >= 60) return 'C';
      return 'F';
    }

    function getGradeClass(marks) {
      if (marks >= 70) return 'success';
      if (marks >= 60) return 'warning';
      return 'danger';
    }

    // Form handlers
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const studentData = {
        name: nameInput.value.trim(),
        department: deptInput.value.trim(),
        marks: parseInt(marksInput.value)
      };

      try {
        let response;
        if (editId) {
          // UPDATE
          response = await API.update(editId, studentData);
          showMessage('✅ Student updated successfully!', 'success');
          editId = null;
          saveBtn.textContent = '💾 Save Student';
        } else {
          // CREATE
          response = await API.create(studentData);
          showMessage('🎉 New student added successfully!', 'success');
        }

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.error}`);
        }

        form.reset();
        await loadStudents();
      } catch (error) {
        showMessage(`❌ ${error.message}`, 'error');
      }
    });

    clearBtn.addEventListener('click', () => {
      form.reset();
      editId = null;
      studentIdInput.value = '';
      saveBtn.textContent = '💾 Save Student';
    });

    loadBtn.addEventListener('click', loadStudents);

    // Edit handler
    function handleEdit(e) {
      const id = e.target.dataset.id;
      const student = students.find(s => s.id === id);
      if (student) {
        nameInput.value = student.name;
        deptInput.value = student.department;
        marksInput.value = student.marks;
        editId = id;
        studentIdInput.value = id;
        saveBtn.textContent = '🔄 Update Student';
        nameInput.focus();
      }
    }

    // Delete handler
    async function handleDelete(e) {
      if (!confirm('Are you sure you want to delete this student?')) return;
      
      const id = e.target.dataset.id;
      try {
        const response = await API.delete(id);
        if (response.ok) {
          showMessage('🗑️ Student deleted successfully!', 'success');
          await loadStudents();
        } else {
          throw new Error(`HTTP ${response.status}`);
        }
      } catch (error) {
        showMessage(`❌ Delete failed: ${error.message}`, 'error');
      }
    }

    function handleHttpError(response) {
      let message = `Server Error (${response.status})`;
      if (response.status === 404) message = 'Student not found';
      else if (response.status === 500) message = 'Server error, please try again';
      showMessage(`❌ ${message}`, 'error');
    }

    // Initial load
    loadStudents();
  </script>
</body>
</html>
