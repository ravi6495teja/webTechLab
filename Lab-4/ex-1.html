<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Username Availability Checker</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      max-width: 400px; 
      margin: 50px auto; 
      padding: 20px; 
      background: #f5f5f5;
    }
    .form-container { 
      background: white; 
      box-shadow: 0 0 10px rgba(0,0,0,0.1); 
      padding: 30px; 
      border-radius: 8px; 
    }
    h2 { text-align: center; margin-bottom: 20px; }
    .input-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input { 
      width: 100%; 
      padding: 12px; 
      border: 1px solid #ddd; 
      border-radius: 4px; 
      font-size: 16px;
      box-sizing: border-box;
    }
    .loading { 
      color: #007bff; 
      font-style: italic; 
      display: none; 
      margin-top: 5px;
    }
    .feedback { 
      display: block; 
      margin-top: 5px; 
      font-weight: bold;
    }
    .feedback.available { color: #28a745; }
    .feedback.taken { color: #dc3545; }
    button { 
      background: #28a745; 
      color: white; 
      padding: 12px; 
      border: none; 
      border-radius: 4px; 
      width: 100%; 
      font-size: 16px; 
      cursor: pointer; 
    }
    button:disabled { 
      background: #ccc; 
      cursor: not-allowed; 
    }
    .success { 
      background: #d4edda; 
      color: #155724; 
      padding: 10px; 
      border-radius: 4px; 
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>Registration Form</h2>
    <form id="regForm">
      <div class="input-group">
        <label for="username">Username (min 3 chars):</label>
        <input type="text" id="username" required minlength="3">
        <span id="loading" class="loading">Checking availability...</span>
        <span id="feedback" class="feedback"></span>
      </div>
      <button type="submit" id="submitBtn" disabled>Register</button>
      <div id="successMsg" class="success">Registration successful! Welcome aboard.</div>
    </form>
  </div>

  <script>
    const usernameInput = document.getElementById('username');
    const feedback = document.getElementById('feedback');
    const loading = document.getElementById('loading');
    const submitBtn = document.getElementById('submitBtn');
    const form = document.getElementById('regForm');
    const successMsg = document.getElementById('successMsg');

    // Simulated users database (like from users.json)
    const takenUsers = ['admin', 'user123', 'john_doe', 'testuser', 'guest'];

    let isAvailable = false;
    let timeoutId;

    // Simulate async server check with delay
    async function checkAvailability(username) {
      return new Promise((resolve) => {
        setTimeout(() => {
          resolve(!takenUsers.includes(username));
        }, 800); // Simulate network delay
      });
    }

    usernameInput.addEventListener('input', function() {
      const username = this.value.trim();
      clearTimeout(timeoutId);
      
      // Reset states
      loading.style.display = 'none';
      feedback.textContent = '';
      feedback.className = 'feedback';
      submitBtn.disabled = true;
      successMsg.style.display = 'none';
      isAvailable = false;

      if (username.length < 3) return;

      loading.style.display = 'block';

      timeoutId = setTimeout(async () => {
        try {
          const available = await checkAvailability(username);
          
          if (available) {
            feedback.textContent = '✅ Username available!';
            feedback.className = 'feedback available';
            isAvailable = true;
          } else {
            feedback.textContent = '❌ Username already taken';
            feedback.className = 'feedback taken';
            isAvailable = false;
          }
        } catch (error) {
          feedback.textContent = '⚠️ Error checking availability';
          feedback.className = 'feedback taken';
        } finally {
          loading.style.display = 'none';
          submitBtn.disabled = !isAvailable;
        }
      }, 500); // Debounce
    });

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      
      if (!isAvailable) {
        feedback.textContent = 'Please choose an available username first!';
        feedback.className = 'feedback taken';
        return;
      }

      // Simulate successful registration
      successMsg.style.display = 'block';
      form.reset();
      submitBtn.disabled = true;
      feedback.textContent = '';
      isAvailable = false;
      
      console.log('User registered:', usernameInput.value.trim());
    });
  </script>
</body>
</html>
