<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Notes Manager</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<header class="header">

<h1>📚 Student Notes Manager</h1>

<div class="header-controls">

<input type="text" id="searchNotes" placeholder="Search notes...">

<select id="filterSubject">
<option value="">Filter by Subject</option>
<option value="DBMS">DBMS</option>
<option value="Cryptography">Cryptography</option>
<option value="Web Development">Web Development</option>
<option value="Statistics">Statistics</option>
<option value="Entrepreneurship">Entrepreneurship</option>
</select>

<button id="darkModeToggle">🌙 Dark Mode</button>

</div>

</header>

<main>

<section class="stats-section">

<div class="stat-box">
<h3>Total Notes</h3>
<p id="totalNotes">0</p>
</div>

<div class="stat-box">
<h3>Subjects Covered</h3>
<p id="totalSubjects">0</p>
</div>

<div class="stat-box">
<h3>Last Updated</h3>
<p id="lastUpdated">--</p>
</div>

</section>

<section class="add-note-section">

<h2>Add New Note</h2>

<form id="noteForm">

<div class="form-row">

<div class="form-group">
<label for="title">Title</label>
<input type="text" id="title" required>
</div>

<div class="form-group">
<label for="subject">Subject</label>
<input type="text" id="subject" required>
</div>

</div>

<div class="form-group">
<label for="description">Description</label>
<textarea id="description" rows="4" required></textarea>
</div>

<div class="form-row">

<div class="form-group">
<label for="tags">Tags</label>
<input type="text" id="tags" placeholder="example: exam, important">
</div>

<div class="form-group">
<label for="priority">Priority</label>

<select id="priority">

<option value="Low">Low</option>
<option value="Medium">Medium</option>
<option value="High">High</option>

</select>

</div>

</div>

<button type="submit" class="btn-add">Add Note</button>

</form>

</section>

<section class="notes-section">

<h2>Your Notes</h2>

<div class="notes-toolbar">

<button id="sortDate">Sort by Date</button>

<button id="sortPriority">Sort by Priority</button>

<button id="clearAll">Clear All Notes</button>

</div>

<div id="notesContainer" class="notes-grid">

<div class="empty-message">

<p>No notes available. Add your first note.</p>

</div>

</div>

</section>

</main>

<!-- Edit Modal -->

<div id="editModal" class="modal">

<div class="modal-content">

<span class="close-btn" id="closeEdit">&times;</span>

<h2>Edit Note</h2>

<form id="editForm">

<input type="hidden" id="editNoteId">

<div class="form-group">
<label for="editTitle">Title</label>
<input type="text" id="editTitle" required>
</div>

<div class="form-group">
<label for="editSubject">Subject</label>
<input type="text" id="editSubject" readonly>
</div>

<div class="form-group">
<label for="editDescription">Description</label>
<textarea id="editDescription" rows="4"></textarea>
</div>

<div class="form-group">
<label for="editTags">Tags</label>
<input type="text" id="editTags">
</div>

<div class="form-group">
<label for="editPriority">Priority</label>

<select id="editPriority">
<option value="Low">Low</option>
<option value="Medium">Medium</option>
<option value="High">High</option>
</select>

</div>

<button type="submit" class="btn-update">Update Note</button>

</form>

</div>

</div>

<!-- Delete Confirmation Modal -->

<div id="deleteModal" class="modal">

<div class="modal-content">

<h2>Delete Note</h2>

<p>Are you sure you want to delete this note?</p>

<div class="modal-actions">

<button id="confirmDelete">Yes Delete</button>

<button id="cancelDelete">Cancel</button>

</div>

</div>

</div>

<footer>

<p>© 2026 Student Notes Manager | Developed by P RAVI TEJA</p>

</footer>

</div>

<script src="script.js"></script>

</body>

</html>
